<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriSense - Sign Up</title>
    <link rel="stylesheet" href="assets/css/signup.css">
</head>

<body>

    <div class="signup-container">

        <div class="signup-card" id="signupCard">
            <a href="/"><img src="assets/images/logo.png" alt="logo"></a>
            <p>Create your account</p>

            <form id="signupForm">

                <div class="input-box">
                    <input type="text" id="name" required>
                    <label>Full Name</label>
                </div>

                <div class="input-box">
                    <input type="email" id="email" required>
                    <label>Email</label>
                </div>

                <div class="input-box">
                    <input type="password" id="password" required>
                    <label>Password</label>
                    <span class="toggle" onclick="togglePassword('password')">👁️</span>
                </div>

                <div class="input-box" style="margin: 0;">
                    <input type="password" id="confirmPassword" required>
                    <label>Confirm Password</label>
                    <span class="toggle" onclick="togglePassword('confirmPassword')">👁️</span>
                </div>

                <p class="error" id="errorMsg"></p>

                <button type="submit">Create Account</button>

                <p class="login-text">
                    Already have an account? <a href="login.html">Login</a>
                </p>

            </form>

        </div>

    </div>
    <script>
        const form = document.getElementById("signupForm");
        const errorMsg = document.getElementById("errorMsg");
        const card = document.getElementById("signupCard");

        form.addEventListener("submit", function (e) {
            e.preventDefault();

            const name = document.getElementById("name").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const confirm = document.getElementById("confirmPassword").value;

            if (name === "" || email === "" || password === "" || confirm === "") {
                showError("All fields are required");
            }
            else if (password.length < 6) {
                showError("Password must be at least 6 characters");
            }
            else if (password !== confirm) {
                showError("Passwords do not match");
            }
            else {
                errorMsg.style.color = "#22c55e";
                errorMsg.innerText = "✅ Account created successfully!";
                form.reset();
            }
        });

        function showError(msg) {
            errorMsg.style.color = "#ff4d4d";
            errorMsg.innerText = msg;

            card.classList.add("shake");
            setTimeout(() => card.classList.remove("shake"), 300);
        }

        /* TOGGLE PASSWORD */
        function togglePassword(id) {
            const field = document.getElementById(id);
            field.type = field.type === "password" ? "text" : "password";
        }
    </script>

</body>

</html>
